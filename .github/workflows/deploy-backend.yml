name: Build, Migrate and Deploy - JMR Portal

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Validate build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install and validate dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          echo "Dependencies installed successfully."

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Run Database Migrations
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key "$VPS_USER@$VPS_HOST" bash << EOF
            set -e

            echo "--- Pulling latest code ---"
            cd /home/rwpnt/jmr-portal
            git pull origin main

            export DATABASE_URL="$DATABASE_URL"

            run_sql() {
              psql "\$DATABASE_URL" -v ON_ERROR_STOP=1 -f "\$1"
            }

            echo "--- Running init.sql ---"
            run_sql /home/rwpnt/jmr-portal/db/init.sql
            echo "init.sql completed."

            echo "--- Running numbered migrations in order ---"
            MIGRATION_DIR="/home/rwpnt/jmr-portal/db/migration"

            migrations=\$(find "\$MIGRATION_DIR" -maxdepth 1 -name "[0-9]*.sql" 2>/dev/null | sort)
            echo "Matched migrations: \$migrations"

            if [ -n "\$migrations" ]; then
              for f in \$migrations; do
                echo "Applying \$f..."
                run_sql "\$f"
                echo "\$f applied."
              done
            else
              echo "No numbered migration files found. Skipping."
            fi

            echo "All migrations completed successfully."
          EOF

          rm -f /tmp/vps_key

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: migrate
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key "$VPS_USER@$VPS_HOST" bash << 'EOF'
            set -e

            echo "--- Pulling latest code ---"
            cd /home/rwpnt/jmr-portal
            git pull origin main

            echo "--- Installing dependencies ---"
            source backend/venv/bin/activate
            pip install -r backend/requirements.txt --quiet

            echo "--- Restarting backend service ---"
            sudo systemctl restart jmr-backend

            echo "--- Verifying service is running ---"
            sleep 3
            if sudo systemctl is-active --quiet jmr-backend; then
              echo "jmr-backend is running."
            else
              echo "ERROR: jmr-backend failed to start!"
              sudo systemctl status jmr-backend
              exit 1
            fi

            echo "Deploy Completed Successfully. YEAYY."
          EOF

          rm -f /tmp/vps_key
