name: Build, Migrate and Deploy - JMR Portal

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Validate build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install and validate dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          echo "Dependencies installed successfully."

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Run Database Migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            export DATABASE_URL="${{ secrets.DATABASE_URL }}"

            run_sql() {
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$1"
            }

            echo "--- Running init.sql ---"
            run_sql /root/jmr-portal/db/init.sql
            echo "init.sql completed."

            echo "--- Running numbered migrations in order ---"
            MIGRATION_DIR="/root/jmr-portal/db/migration"

            if ls "$MIGRATION_DIR"/[0-9]*.sql 1>/dev/null 2>&1; then
              for f in $(ls "$MIGRATION_DIR"/[0-9]*.sql | sort); do
                echo "Applying $f..."
                run_sql "$f"
                echo "$f applied."
              done
            else
              echo "No numbered migration files found. Skipping."
            fi

            echo "All migrations completed successfully."

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: migrate
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            echo "--- Pulling latest code ---"
            cd /root/jmr-portal
            git pull origin main

            echo "--- Installing dependencies ---"
            source backend/venv/bin/activate
            pip install -r backend/requirements.txt --quiet

            echo "--- Restarting backend service ---"
            systemctl restart jmr-backend

            echo "--- Verifying service is running ---"
            sleep 3
            if systemctl is-active --quiet jmr-backend; then
              echo "jmr-backend is running."
            else
              echo "ERROR: jmr-backend failed to start!"
              systemctl status jmr-backend
              exit 1
            fi

            echo "Deploy Completed Successfully. YEAYY."
